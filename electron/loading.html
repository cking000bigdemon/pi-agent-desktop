<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
    <title>pi-web</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0b0b0c;
        color: #e7e7ea;
        font-family: -apple-system, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
      }
      .spinner {
        width: 38px;
        height: 38px;
        border: 3px solid #2a2a2e;
        border-top-color: #7c7cf0;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .title { font-size: 16px; letter-spacing: 0.5px; opacity: 0.95; }
      .sub { font-size: 12.5px; color: #8a8a92; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <div class="title">正在启动 pi-web…</div>
      <div class="sub">首次启动需拉起本地服务，请稍候</div>
    </div>
  </body>
</html>
