<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
    <title>Pi Agent — 更新中</title>
    <style>
      /* Metro live-tile shell chrome — see loading.html for token rationale. */
      :root {
        --bg: #0A0A0A;
        --text: #FFFFFF;
        --text-dim: #6A6A6A;
        --accent: #0050EF;
      }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Selawik, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
      }
      .dots { display: flex; gap: 9px; }
      .dots span {
        width: 9px;
        height: 9px;
        background: var(--accent);
        animation: dotPulse 1.2s ease-in-out infinite;
      }
      .dots span:nth-child(2) { animation-delay: 0.15s; }
      .dots span:nth-child(3) { animation-delay: 0.30s; }
      .dots span:nth-child(4) { animation-delay: 0.45s; }
      .dots span:nth-child(5) { animation-delay: 0.60s; }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.25; transform: scale(0.7); }
        50%      { opacity: 1;    transform: scale(1); }
      }
      .title { font-size: 26px; font-weight: 300; letter-spacing: 0.5px; }
      .sub { font-size: 12.5px; color: var(--text-dim); letter-spacing: 0.2px; }
      @media (prefers-reduced-motion: reduce) {
        .dots span { animation: none; opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="dots"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="title">正在更新 Pi Agent…</div>
      <div class="sub">正在下载最新版本并重启内嵌服务，请勿关闭窗口</div>
    </div>
  </body>
</html>
