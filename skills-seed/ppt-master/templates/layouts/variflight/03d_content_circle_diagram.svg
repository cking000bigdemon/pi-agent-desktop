<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 内容页 (圆形信息图) - 飞常准品牌风格 (literal fidelity from slide 23) -->

    <defs>
        <radialGradient id="bigCircle1" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#2C68FF"/>
            <stop offset="1" stop-color="#0048AA" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="bubbleFill" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0.5" stop-color="#093CCC"/>
            <stop offset="0.91" stop-color="#B7EDFD"/>
        </radialGradient>
        <radialGradient id="bubbleOuter" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0.5" stop-color="#3D6DF6"/>
            <stop offset="0.91" stop-color="#2C68FF"/>
        </radialGradient>
        <filter id="bubbleShadow" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="14" dy="14" stdDeviation="20" flood-color="#275DF5" flood-opacity="0.35"/>
        </filter>
    </defs>

    <!-- 白色背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

    <!-- 顶部小蓝色装饰块 + 标题 -->
    <rect x="0" y="43.87" width="36.69" height="51.13" fill="#0048AA"/>
    <text x="57.6" y="78" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="26" font-weight="bold" fill="#0048AA">{{PAGE_TITLE}}</text>
    <line x1="0" y1="113" x2="1280" y2="113" stroke="#E5E7EB" stroke-width="1"/>

    <!-- 右侧大同心圆装饰 -->
    <ellipse cx="1012.36" cy="409.5" rx="447.97" ry="450.14" fill="#0048AA" fill-opacity="0.05"/>
    <ellipse cx="1012.36" cy="410.58" rx="265.45" ry="266.73" fill="#0048AA" fill-opacity="0.15"/>
    <ellipse cx="1002.68" cy="409.53" rx="186.55" ry="187.45" fill="url(#bigCircle1)"/>

    <!-- 左侧描述文本区 -->
    <text x="65" y="200" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="28" fill="#0048AA" font-weight="bold">{{LEFT_HEADLINE}}</text>
    <text x="65" y="245" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#5C5C5C">{{LEFT_BODY_01}}</text>
    <text x="65" y="275" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#5C5C5C">{{LEFT_BODY_02}}</text>
    <text x="65" y="305" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#5C5C5C">{{LEFT_BODY_03}}</text>

    <!-- 中央 1 (右上) -->
    <ellipse cx="870.59" cy="387.84" rx="63" ry="63" fill="url(#bubbleFill)" filter="url(#bubbleShadow)"/>
    <ellipse cx="870.59" cy="387.84" rx="65.52" ry="65.52" fill="url(#bubbleOuter)" fill-opacity="0.4"/>
    <text x="870.59" y="382" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#FFFFFF" font-weight="bold">{{BUBBLE_01_LINE1}}</text>
    <text x="870.59" y="408" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#FFFFFF" font-weight="bold">{{BUBBLE_01_LINE2}}</text>

    <!-- 中央 2 (中上) -->
    <ellipse cx="697.66" cy="307.98" rx="63" ry="63" fill="url(#bubbleFill)" filter="url(#bubbleShadow)"/>
    <ellipse cx="697.66" cy="307.98" rx="65.52" ry="65.52" fill="url(#bubbleOuter)" fill-opacity="0.4"/>
    <text x="697.66" y="302" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#FFFFFF" font-weight="bold">{{BUBBLE_02_LINE1}}</text>
    <text x="697.66" y="328" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#FFFFFF" font-weight="bold">{{BUBBLE_02_LINE2}}</text>

    <!-- 中央 3 (中下) -->
    <ellipse cx="707.1" cy="471.12" rx="63" ry="63" fill="url(#bubbleFill)" filter="url(#bubbleShadow)"/>
    <ellipse cx="707.1" cy="471.12" rx="65.52" ry="65.52" fill="url(#bubbleOuter)" fill-opacity="0.4"/>
    <text x="707.1" y="465" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#FFFFFF" font-weight="bold">{{BUBBLE_03_LINE1}}</text>
    <text x="707.1" y="491" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#FFFFFF" font-weight="bold">{{BUBBLE_03_LINE2}}</text>

    <!-- 装饰小点 -->
    <ellipse cx="971.81" cy="337.34" rx="15.03" ry="15.03" fill="#2C68FF" fill-opacity="0.3"/>
    <ellipse cx="613.99" cy="406.55" rx="49.59" ry="49.59" fill="#275DF5" fill-opacity="0.25"/>
    <ellipse cx="950.4" cy="493.06" rx="8.01" ry="8.01" fill="#0048AA" fill-opacity="0.4"/>
    <ellipse cx="642.26" cy="169.6" rx="12.42" ry="12.42" fill="#0048AA" fill-opacity="0.3"/>

    <!-- 右下版权声明 -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#808080">Copyright© 飞友科技. All rights reserved.</text>
</svg>
