<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 章节封面 (极简变体) - 飞常准品牌风格 (literal fidelity from layout 03 + slide 12) -->

    <!-- 白色背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

    <!-- 顶部小蓝色装饰块 (layout 03 自带) -->
    <rect x="0" y="43.87" width="36.69" height="51.13" fill="#0048AA"/>

    <!-- 顶部头部条 (空白，章节页不放章节名) -->

    <!-- 右上角 sprite (corner_sprite from image5, sprite-sheet 裁剪) -->
    <svg x="609.73" y="80.27" width="619.93" height="196.53" viewBox="0.03984 0 0.83444 0.90153" preserveAspectRatio="none">
        <image href="assets/corner_sprite.png" x="0" y="0" width="1" height="1" preserveAspectRatio="none"/>
    </svg>

    <!-- 章节大编号 (左侧极简) -->
    <text x="120" y="360" font-family="&quot;Gadugi&quot;, sans-serif" font-size="200" font-weight="bold" fill="#0048AA" fill-opacity="0.92" letter-spacing="-4">{{CHAPTER_NUM}}</text>

    <!-- 蓝色横线分隔 -->
    <line x1="120" y1="400" x2="640" y2="400" stroke="#0048AA" stroke-width="2"/>

    <!-- 章节中文标题 -->
    <text x="120" y="465" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="44" fill="#0048AA" font-weight="bold">{{CHAPTER_TITLE}}</text>

    <!-- 章节英文副标题 -->
    <text x="120" y="510" font-family="&quot;Gadugi&quot;, sans-serif" font-size="22" fill="#667583" letter-spacing="3">{{CHAPTER_SUBTITLE_EN}}</text>

    <!-- 章节描述 -->
    <text x="120" y="570" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#5C5C5C">{{CHAPTER_DESCRIPTION}}</text>

    <!-- 右下版权声明 (master 继承) -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#808080">Copyright© 飞友科技. All rights reserved.</text>
</svg>
