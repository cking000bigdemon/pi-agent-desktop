<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 内容页 (列表 + 右侧表格卡) - 飞常准品牌风格 (literal fidelity from slide 13) -->

    <defs>
        <linearGradient id="cardGrad" x1="-0.0086" y1="0.9911" x2="1.0086" y2="0.0089">
            <stop offset="0" stop-color="#F2F2F2" stop-opacity="0.08"/>
            <stop offset="0.12" stop-color="#F9F9F9"/>
            <stop offset="1" stop-color="#FFFFFF"/>
        </linearGradient>
        <filter id="rightCardShadow" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="2.83" dy="-2.83" stdDeviation="2.67" flood-color="#EAECED" flood-opacity="0.4"/>
        </filter>
    </defs>

    <!-- 白色背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

    <!-- 顶部小蓝色装饰块 + 标题 -->
    <rect x="0" y="43.87" width="36.69" height="51.13" fill="#0048AA"/>
    <text x="57.6" y="78" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="26" font-weight="bold" fill="#0048AA">{{PAGE_TITLE}}</text>
    <line x1="0" y1="113" x2="1280" y2="113" stroke="#E5E7EB" stroke-width="1"/>

    <!-- 左侧 sub-title -->
    <text x="65.4" y="155" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="26.67" fill="#0048AA" font-weight="bold">{{LEFT_SUBTITLE}}</text>

    <!-- 左侧表格 (5列 x 6行简化网格) -->
    <g>
        <!-- 表头 -->
        <rect x="64.47" y="183.8" width="142.4" height="32.27" fill="#0048AA"/>
        <rect x="206.87" y="183.8" width="142.4" height="32.27" fill="#0048AA"/>
        <rect x="349.27" y="183.8" width="142.4" height="32.27" fill="#0048AA"/>
        <rect x="491.67" y="183.8" width="142.4" height="32.27" fill="#0048AA"/>
        <rect x="634.07" y="183.8" width="142.4" height="32.27" fill="#0048AA"/>
        <text x="135.67" y="204" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#FFFFFF">{{COL_HEAD_01}}</text>
        <text x="278.07" y="204" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#FFFFFF">{{COL_HEAD_02}}</text>
        <text x="420.47" y="204" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#FFFFFF">{{COL_HEAD_03}}</text>
        <text x="562.87" y="204" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#FFFFFF">{{COL_HEAD_04}}</text>
        <text x="705.27" y="204" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#FFFFFF">{{COL_HEAD_05}}</text>

        <!-- 条纹行 (3 行简化) -->
        <rect x="64.47" y="216.07" width="712" height="43.07" fill="#77B1FF" fill-opacity="0.4"/>
        <rect x="64.47" y="259.13" width="712" height="43.33" fill="#FFFFFF"/>
        <rect x="64.47" y="302.47" width="712" height="42.87" fill="#77B1FF" fill-opacity="0.4"/>
        <rect x="64.47" y="345.33" width="712" height="43.47" fill="#FFFFFF"/>
    </g>

    <!-- 左侧 5 行图标列表 -->
    <text x="65.4" y="425" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#0048AA" font-weight="bold">{{LIST_TITLE}}</text>
    <g font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#262626">
        <circle cx="80" cy="465" r="10" fill="#0048AA"/>
        <text x="100" y="471">{{LIST_ITEM_01}}</text>
        <circle cx="80" cy="505" r="10" fill="#0048AA"/>
        <text x="100" y="511">{{LIST_ITEM_02}}</text>
        <circle cx="80" cy="545" r="10" fill="#D76227"/>
        <text x="100" y="551">{{LIST_ITEM_03}}</text>
        <circle cx="80" cy="585" r="10" fill="#0048AA"/>
        <text x="100" y="591">{{LIST_ITEM_04}}</text>
        <circle cx="80" cy="625" r="10" fill="#0048AA"/>
        <text x="100" y="631">{{LIST_ITEM_05}}</text>
    </g>

    <!-- 右侧大卡片 -->
    <rect x="812.13" y="125.67" width="437.8" height="542.87" rx="12.7" ry="12.7" fill="url(#cardGrad)" filter="url(#rightCardShadow)"/>

    <!-- 右侧表格头 -->
    <rect x="851.67" y="177.8" width="360.13" height="47.39" fill="#0048AA"/>
    <text x="1031.74" y="207" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">{{RIGHT_TABLE_TITLE}}</text>

    <!-- 右侧 5 行 (浅色) -->
    <g>
        <rect x="851.67" y="225.19" width="78.13" height="79.75" fill="#0048AA" fill-opacity="0.1"/>
        <rect x="929.8" y="225.19" width="282" height="79.75" fill="#0048AA" fill-opacity="0.1"/>
        <text x="944.2" y="270" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="20" fill="#3C3C3C">{{RIGHT_ITEM_01}}</text>

        <rect x="851.67" y="304.94" width="78.13" height="79.75" fill="#D76227" fill-opacity="0.1"/>
        <rect x="929.8" y="304.94" width="282" height="79.75" fill="#D76227" fill-opacity="0.1"/>
        <text x="944.2" y="350" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="20" fill="#3C3C3C">{{RIGHT_ITEM_02}}</text>

        <rect x="851.67" y="384.69" width="78.13" height="79.75" fill="#2C68FF" fill-opacity="0.1"/>
        <rect x="929.8" y="384.69" width="282" height="79.75" fill="#2C68FF" fill-opacity="0.1"/>
        <text x="944.2" y="430" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="20" fill="#3C3C3C">{{RIGHT_ITEM_03}}</text>

        <rect x="851.67" y="464.44" width="78.13" height="79.75" fill="#366FC1" fill-opacity="0.1"/>
        <rect x="929.8" y="464.44" width="282" height="79.75" fill="#366FC1" fill-opacity="0.1"/>
        <text x="944.2" y="510" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="20" fill="#3C3C3C">{{RIGHT_ITEM_04}}</text>

        <rect x="851.67" y="544.19" width="78.13" height="79.75" fill="#9FA9B3" fill-opacity="0.1"/>
        <rect x="929.8" y="544.19" width="282" height="79.75" fill="#9FA9B3" fill-opacity="0.1"/>
        <text x="944.2" y="590" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="20" fill="#3C3C3C">{{RIGHT_ITEM_05}}</text>
    </g>

    <!-- 右下版权声明 -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#808080">Copyright© 飞友科技. All rights reserved.</text>
</svg>
