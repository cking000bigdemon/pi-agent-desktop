<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720">
    <!-- 模板: 章节封面 (深色蒙层变体) - 飞常准品牌风格 (literal fidelity from layout 05 + slide 09) -->

    <!-- 背景图全屏 -->
    <image href="assets/chapter_bg.jpeg" x="0" y="-4.13" width="1298.2" height="724.13" preserveAspectRatio="xMidYMid slice"/>

    <!-- 深蓝 94% 蒙层 -->
    <rect x="0" y="-2.9" width="1298.27" height="725.8" fill="#144484" fill-opacity="0.94"/>

    <!-- 右上角 sprite 装饰 (corner_sprite from image5) — 保留 sprite-sheet 裁剪 -->
    <g>
        <svg x="277.67" y="80.27" width="742.93" height="218" viewBox="0 0 1 1" preserveAspectRatio="none">
            <image href="assets/corner_sprite.png" x="0" y="0" width="1" height="1" preserveAspectRatio="none"/>
        </svg>
    </g>

    <!-- 中央 Logo (slogan_logo from image16) -->
    <image href="assets/slogan_logo.png" x="531.62" y="579.13" width="224.21" height="78.86" preserveAspectRatio="none"/>

    <!-- 双行 slogan (中文 + 英文) -->
    <text x="640" y="320" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="53.33" fill="#FFFFFF" font-weight="bold">{{SLOGAN_CN}}</text>
    <text x="640" y="400" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="40" fill="#FFFFFF" font-weight="bold" fill-opacity="0.85">{{SLOGAN_EN}}</text>

    <!-- 章节标题 (顶部) -->
    <text x="640" y="200" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="32" fill="#BBD8FF" letter-spacing="6">{{CHAPTER_LABEL}}</text>
</svg>
