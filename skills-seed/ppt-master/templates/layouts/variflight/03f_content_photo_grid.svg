<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 内容页 (6 图卡网格) - 飞常准品牌风格 (literal fidelity from slide 26) -->

    <defs>
        <linearGradient id="topBlueFade" x1="1" y1="0.5" x2="0" y2="0.5">
            <stop offset="0" stop-color="#0048AA" stop-opacity="0"/>
            <stop offset="0.98" stop-color="#2C68FF"/>
        </linearGradient>
        <linearGradient id="bottomBlueFade" x1="1" y1="0.5" x2="0" y2="0.5">
            <stop offset="0" stop-color="#2C68FF" stop-opacity="0"/>
            <stop offset="0.69" stop-color="#0048AA"/>
        </linearGradient>
    </defs>

    <!-- 白色背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

    <!-- 顶部小蓝色装饰块 + 标题 -->
    <rect x="0" y="43.87" width="36.69" height="51.13" fill="#0048AA"/>
    <text x="57.6" y="78" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="26" font-weight="bold" fill="#0048AA">{{PAGE_TITLE}}</text>

    <!-- 上下两条品牌色渐变背景 -->
    <rect x="0" y="155.87" width="1280" height="280.67" fill="url(#topBlueFade)"/>
    <rect x="0" y="436" width="1280" height="284" fill="url(#bottomBlueFade)"/>

    <!-- 上排 3 卡 -->
    <g>
        <rect x="473.65" y="199.64" width="272.13" height="189.13" fill="#FFFFFF" fill-opacity="0.85" stroke="#FFFFFF" stroke-opacity="0.5"/>
        <rect x="710.85" y="199.64" width="272.13" height="189.13" fill="#FFFFFF" fill-opacity="0.85" stroke="#FFFFFF" stroke-opacity="0.5"/>
        <rect x="946.95" y="198.34" width="275.88" height="191.74" fill="#FFFFFF" fill-opacity="0.85" stroke="#FFFFFF" stroke-opacity="0.5"/>
        <!-- 图片占位 (3 张) -->
        <rect x="520.32" y="230.71" width="178.77" height="126.99" fill="#E5E7EB" stroke="#999999" stroke-dasharray="4 4"/>
        <text x="609.7" y="298" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="13" fill="#999999">{{IMAGE_01}}</text>
        <rect x="756.92" y="230.71" width="178.77" height="126.99" fill="#E5E7EB" stroke="#999999" stroke-dasharray="4 4"/>
        <text x="846.3" y="298" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="13" fill="#999999">{{IMAGE_02}}</text>
        <rect x="994.79" y="230.71" width="178.77" height="126.99" fill="#E5E7EB" stroke="#999999" stroke-dasharray="4 4"/>
        <text x="1084.18" y="298" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="13" fill="#999999">{{IMAGE_03}}</text>
    </g>

    <!-- 左侧文字 (顶部) -->
    <text x="44.8" y="266.87" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="32" fill="#FFFFFF">{{TOP_TITLE}}</text>
    <text x="44.8" y="306.93" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="20" fill="#FFFFFF" fill-opacity="0.9">{{TOP_SUBTITLE}}</text>

    <!-- 下排 4 卡 (旋转 90°) -->
    <g>
        <g transform="rotate(90 581.93 581)">
            <rect x="444" y="485.13" width="275.87" height="191.73" fill="#FFFFFF" fill-opacity="0.85" stroke="#FFFFFF" stroke-opacity="0.5"/>
        </g>
        <g transform="rotate(90 760 581)">
            <rect x="622.07" y="485.13" width="275.87" height="191.73" fill="#FFFFFF" fill-opacity="0.85" stroke="#FFFFFF" stroke-opacity="0.5"/>
        </g>
        <g transform="rotate(90 938.07 581)">
            <rect x="800.13" y="485.13" width="275.87" height="191.73" fill="#FFFFFF" fill-opacity="0.85" stroke="#FFFFFF" stroke-opacity="0.5"/>
        </g>
        <g transform="rotate(90 1116.13 581)">
            <rect x="978.2" y="485.13" width="275.87" height="191.73" fill="#FFFFFF" fill-opacity="0.85" stroke="#FFFFFF" stroke-opacity="0.5"/>
        </g>
        <!-- 图片占位 (4 张, 矩形) -->
        <rect x="514.27" y="492.47" width="135.33" height="177.13" fill="#E5E7EB" stroke="#999999" stroke-dasharray="4 4"/>
        <text x="581.93" y="581" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="13" fill="#999999">{{IMAGE_04}}</text>
        <rect x="692.33" y="492.47" width="135.33" height="177.13" fill="#E5E7EB" stroke="#999999" stroke-dasharray="4 4"/>
        <text x="760" y="581" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="13" fill="#999999">{{IMAGE_05}}</text>
        <rect x="870.4" y="492.47" width="135.33" height="177.13" fill="#E5E7EB" stroke="#999999" stroke-dasharray="4 4"/>
        <text x="938.07" y="581" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="13" fill="#999999">{{IMAGE_06}}</text>
        <rect x="1048.47" y="492.47" width="135.33" height="177.13" fill="#E5E7EB" stroke="#999999" stroke-dasharray="4 4"/>
        <text x="1116.13" y="581" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="13" fill="#999999">{{IMAGE_07}}</text>
    </g>

    <!-- 左侧文字 (底部) -->
    <text x="37.2" y="542.33" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="32" fill="#FFFFFF">{{BOTTOM_TITLE}}</text>
    <text x="37.2" y="583.87" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="20" fill="#FFFFFF" fill-opacity="0.9">{{BOTTOM_SUBTITLE}}</text>

    <!-- 右下版权声明 -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.7">Copyright© 飞友科技. All rights reserved.</text>
</svg>
