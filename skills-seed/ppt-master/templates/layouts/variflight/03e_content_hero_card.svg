<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 内容页 (顶部主图 + 卡片信息) - 飞常准品牌风格 (literal fidelity from slide 20) -->

    <defs>
        <linearGradient id="bottomBlue20" x1="0.5" y1="0" x2="0.5" y2="1">
            <stop offset="0" stop-color="#0048AA"/>
            <stop offset="0.96" stop-color="#1658D5"/>
            <stop offset="1" stop-color="#2C68FF"/>
        </linearGradient>
        <linearGradient id="heroFade" x1="0" y1="0.5" x2="1" y2="0.5">
            <stop offset="0.76" stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#FAFAFA" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="cardHeaderGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0048AA"/>
            <stop offset="1" stop-color="#2C68FF"/>
        </linearGradient>
        <filter id="heroCardShadow" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="0" dy="21" stdDeviation="13" flood-color="#000000" flood-opacity="0.25"/>
        </filter>
    </defs>

    <!-- 白色背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

    <!-- 顶部小蓝色装饰块 + 标题 -->
    <rect x="0" y="43.87" width="36.69" height="51.13" fill="#0048AA"/>
    <text x="57.6" y="78" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="26" font-weight="bold" fill="#0048AA">{{PAGE_TITLE}}</text>
    <line x1="0" y1="113" x2="1280" y2="113" stroke="#E5E7EB" stroke-width="1"/>

    <!-- 底部品牌蓝渐变条 -->
    <rect x="0" y="570.27" width="1280" height="152.53" fill="url(#bottomBlue20)"/>

    <!-- 顶部主图占位 (右侧) -->
    <rect x="916.7" y="113.73" width="363.07" height="223.6" fill="#E5E7EB" stroke="#999999" stroke-dasharray="6 4"/>
    <text x="1098.2" y="225" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#999999">{{HERO_IMAGE}}</text>

    <!-- 左侧渐隐文本区 (浮在顶部主图上, 提供可读性) -->
    <rect x="-0.23" y="113.73" width="1283.13" height="223.6" fill="url(#heroFade)"/>

    <!-- 顶部小标题 + 描述 -->
    <text x="89.18" y="166.53" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="32" fill="#0048AA" font-weight="bold">{{TOP_SUBTITLE}}</text>
    <text x="89.18" y="205.68" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="21" fill="#404040">{{TOP_DESCRIPTION}}</text>

    <!-- 左中央 大白卡 -->
    <rect x="86.87" y="248.93" width="335.67" height="316.87" fill="#FFFFFF" filter="url(#heroCardShadow)"/>
    <!-- 卡顶部渐变 head -->
    <rect x="85.93" y="239.07" width="336.73" height="73.54" fill="url(#cardHeaderGrad)"/>
    <text x="254.97" y="286.93" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="29.33" fill="#FFFFFF">{{CARD_01_KEYWORD}}</text>
    <text x="102.58" y="362.45" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#404040">{{CARD_01_LINE1}}</text>
    <text x="102.58" y="392.45" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#404040">{{CARD_01_LINE2}}</text>
    <text x="102.58" y="422.45" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#404040">{{CARD_01_LINE3}}</text>
    <rect x="226.72" y="540" width="55.95" height="4" fill="#275DF5"/>

    <!-- 中央卡 -->
    <rect x="472.2" y="248.93" width="335.67" height="316.87" fill="#FFFFFF" filter="url(#heroCardShadow)"/>
    <rect x="471.26" y="239.07" width="336.73" height="73.54" fill="url(#cardHeaderGrad)"/>
    <text x="640.3" y="286.93" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="29.33" fill="#FFFFFF">{{CARD_02_KEYWORD}}</text>
    <text x="487.91" y="362.45" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#404040">{{CARD_02_LINE1}}</text>
    <text x="487.91" y="392.45" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#404040">{{CARD_02_LINE2}}</text>
    <text x="487.91" y="422.45" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#404040">{{CARD_02_LINE3}}</text>
    <rect x="612.05" y="540" width="55.95" height="4" fill="#275DF5"/>

    <!-- 右侧卡 -->
    <rect x="857.53" y="248.93" width="335.67" height="316.87" fill="#FFFFFF" filter="url(#heroCardShadow)"/>
    <rect x="856.59" y="239.07" width="336.73" height="73.54" fill="url(#cardHeaderGrad)"/>
    <text x="1025.63" y="286.93" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="29.33" fill="#FFFFFF">{{CARD_03_KEYWORD}}</text>
    <text x="873.24" y="362.45" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#404040">{{CARD_03_LINE1}}</text>
    <text x="873.24" y="392.45" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#404040">{{CARD_03_LINE2}}</text>
    <text x="873.24" y="422.45" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#404040">{{CARD_03_LINE3}}</text>
    <rect x="997.38" y="540" width="55.95" height="4" fill="#275DF5"/>

    <!-- 底部蓝条文字 -->
    <text x="640" y="630" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#FFFFFF">{{BOTTOM_INSIGHT}}</text>

    <!-- 右下版权声明 -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.7">Copyright© 飞友科技. All rights reserved.</text>
</svg>
