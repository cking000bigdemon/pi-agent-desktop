<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 目录页 - 飞常准品牌风格 (literal fidelity from slide 02) -->

    <defs>
        <linearGradient id="tocHeader" x1="0" y1="0.5" x2="1" y2="0.5">
            <stop offset="0" stop-color="#084088"/>
            <stop offset="0.9266" stop-color="#0048AA" stop-opacity="0.92"/>
        </linearGradient>
        <linearGradient id="tocSideBar" x1="0.5" y1="0" x2="0.5" y2="1">
            <stop offset="0" stop-color="#0048AA"/>
            <stop offset="1" stop-color="#2C68FF"/>
        </linearGradient>
    </defs>

    <!-- 白色背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

    <!-- 顶部深蓝渐变条 (171.6 高) -->
    <rect x="0" y="0" width="1280" height="171.6" fill="url(#tocHeader)"/>

    <!-- 顶部装饰 "TONTENTS" 字样 (浅米色) -->
    <text x="297" y="98" font-family="&quot;Gadugi&quot;, sans-serif" font-size="38" font-weight="bold" fill="#F7E0D4" fill-opacity="0.5" letter-spacing="3">CONTENTS</text>

    <!-- "目录" 大标题 -->
    <text x="90.93" y="100.47" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="58.67" fill="#FFFFFF" font-weight="bold">目录</text>

    <!-- 左侧渐变竖条 -->
    <rect x="65.67" y="253.33" width="17.07" height="394.87" fill="url(#tocSideBar)"/>

    <!-- 左侧浅蓝大卡片 -->
    <rect x="90.93" y="253.33" width="654.73" height="395.6" fill="#F1F3FA"/>

    <!-- 5 项目录条目 (使用 indexed TOC 占位符) -->
    <text x="123.97" y="342.36" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="32" fill="#0048AA"><tspan>1. </tspan><tspan>{{TOC_TITLE_01}}</tspan></text>
    <text x="123.97" y="396.76" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="32" fill="#0048AA"><tspan>2. </tspan><tspan>{{TOC_TITLE_02}}</tspan></text>
    <text x="123.97" y="451.16" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="32" fill="#0048AA"><tspan>3. </tspan><tspan>{{TOC_TITLE_03}}</tspan></text>
    <text x="123.97" y="505.56" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="32" fill="#0048AA"><tspan>4. </tspan><tspan>{{TOC_TITLE_04}}</tspan></text>
    <text x="123.97" y="559.96" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="32" fill="#0048AA"><tspan>5. </tspan><tspan>{{TOC_TITLE_05}}</tspan></text>

    <!-- 右侧章节预览区 -->
    <text x="800" y="345" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="24" font-weight="bold" fill="#0048AA">{{SECTION_PREVIEW_TITLE}}</text>
    <line x1="800" y1="370" x2="1190" y2="370" stroke="#0048AA" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="800" y="410" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#5C5C5C">{{SECTION_PREVIEW_BODY}}</text>

    <!-- 右下版权声明 -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#808080">Copyright© 飞友科技. All rights reserved.</text>
</svg>
