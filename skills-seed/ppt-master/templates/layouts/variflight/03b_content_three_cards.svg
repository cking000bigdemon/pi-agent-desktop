<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 内容页 (三栏图表卡片 + 顶部标签条) - 飞常准品牌风格 (literal fidelity from slide 15) -->

    <defs>
        <linearGradient id="topBlueBar" x1="0.88" y1="-0.08" x2="0.12" y2="1.08">
            <stop offset="0" stop-color="#2C68FF"/>
            <stop offset="0.87" stop-color="#0043A8"/>
            <stop offset="1" stop-color="#003883"/>
        </linearGradient>
    </defs>

    <!-- 白色背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

    <!-- 顶部小蓝色装饰块 + 标题 -->
    <rect x="0" y="43.87" width="36.69" height="51.13" fill="#0048AA"/>
    <text x="57.6" y="78" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="26" font-weight="bold" fill="#0048AA">{{PAGE_TITLE}}</text>
    <line x1="0" y1="113" x2="1280" y2="113" stroke="#E5E7EB" stroke-width="1"/>

    <!-- 顶部三栏蓝色标签条 -->
    <rect x="72.6" y="118.32" width="1127.4" height="46.34" fill="url(#topBlueBar)"/>
    <text x="258.74" y="148.96" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="21.33" fill="#FFFFFF" font-weight="bold">{{CARD_LABEL_01}}</text>
    <text x="642.33" y="148.96" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="21.33" fill="#FFFFFF" font-weight="bold">{{CARD_LABEL_02}}</text>
    <text x="1017.86" y="148.96" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="21.33" fill="#FFFFFF" font-weight="bold">{{CARD_LABEL_03}}</text>

    <!-- 三个浅灰卡片 -->
    <rect x="72.6" y="178.48" width="364.22" height="235.15" fill="#F2F2F2" fill-opacity="0.46"/>
    <rect x="452.19" y="178.48" width="364.22" height="235.15" fill="#F2F2F2" fill-opacity="0.46"/>
    <rect x="831.8" y="178.47" width="364.13" height="235.13" fill="#F2F2F2" fill-opacity="0.46"/>

    <!-- 三个图表占位 -->
    <rect x="81.34" y="193.66" width="342.33" height="201.55" fill="none" stroke="#999999" stroke-dasharray="4 4"/>
    <text x="252.51" y="294.44" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#999999">{{CHART_01}}</text>
    <rect x="458.51" y="185.25" width="342.13" height="201.55" fill="none" stroke="#999999" stroke-dasharray="4 4"/>
    <text x="629.57" y="286.02" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#999999">{{CHART_02}}</text>
    <rect x="831.72" y="184.72" width="342.13" height="201.55" fill="none" stroke="#999999" stroke-dasharray="4 4"/>
    <text x="1002.78" y="285.49" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#999999">{{CHART_03}}</text>

    <!-- 底部宽卡片 -->
    <rect x="72.53" y="424.2" width="1123.4" height="227.4" fill="#F2F2F2" fill-opacity="0.46"/>
    <rect x="108.87" y="438" width="1056.67" height="199.8" fill="none" stroke="#999999" stroke-dasharray="4 4"/>
    <text x="637.2" y="537.9" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#999999">{{BOTTOM_CHART}}</text>

    <!-- 右下版权声明 -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#808080">Copyright© 飞友科技. All rights reserved.</text>
</svg>
