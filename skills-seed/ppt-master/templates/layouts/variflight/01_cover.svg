<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 封面页 - 飞常准品牌风格 (literal fidelity from slide 01) -->

    <!-- 深蓝色全屏背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#144484"/>

    <!-- 底部装饰图 (image1) — 水平镜像保留原始 sprite 几何 -->
    <g transform="translate(640 551.86) scale(-1 1) translate(-640 -551.86)">
        <image href="assets/cover_bottom_wave.png" x="0" y="369.36" width="1280" height="364.99" preserveAspectRatio="none"/>
    </g>

    <!-- 左上角公司 Logo (image2) -->
    <image href="assets/logo.png" x="70.33" y="62.27" width="176.55" height="42.49" preserveAspectRatio="none"/>

    <!-- 主标题 -->
    <text x="70.33" y="262" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF">{{TITLE}}</text>
    <text x="70.33" y="328" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF">{{TITLE_LINE2}}</text>

    <!-- 副标题 -->
    <text x="70.33" y="392" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="24" fill="#BBD8FF">{{SUBTITLE}}</text>

    <!-- 底部装饰横线 (image3) -->
    <image href="assets/cover_footer_line.png" x="87.95" y="509.99" width="1104.1" height="76.81" preserveAspectRatio="none"/>

    <!-- 作者 / 日期 -->
    <text x="87.95" y="615" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#FFFFFF" fill-opacity="0.85">{{AUTHOR}}</text>
    <text x="87.95" y="642" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18" fill="#FFFFFF" fill-opacity="0.65">{{DATE}}</text>

    <!-- 右下版权声明 (master 继承) -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.5">Copyright© 飞友科技. All rights reserved.</text>
</svg>
