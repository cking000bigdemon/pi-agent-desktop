<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 通用内容页 - 飞常准品牌风格 (literal fidelity from layout 03/04) -->

    <!-- 白色背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

    <!-- 顶部小蓝色装饰块 -->
    <rect x="0" y="43.87" width="36.69" height="51.13" fill="#0048AA"/>

    <!-- 页面标题 -->
    <text x="57.6" y="78" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="26" font-weight="bold" fill="#0048AA">{{PAGE_TITLE}}</text>

    <!-- 右上角 sprite (sprite-sheet 裁剪) -->
    <svg x="609.73" y="80.27" width="619.93" height="196.53" viewBox="0.03984 0 0.83444 0.90153" preserveAspectRatio="none">
        <image href="assets/corner_sprite.png" x="0" y="0" width="1" height="1" preserveAspectRatio="none"/>
    </svg>

    <!-- 顶部分隔线 -->
    <line x1="0" y1="113" x2="1280" y2="113" stroke="#E5E7EB" stroke-width="1"/>

    <!-- 内容自由布局区 -->
    <rect x="50.67" y="148.32" width="1177.33" height="490" fill="none" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="8,6" rx="6"/>
    <text x="640" y="385" text-anchor="middle" fill="#BDC3C7" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="18">{{CONTENT_AREA}}</text>
    <text x="640" y="415" text-anchor="middle" fill="#D5DBDB" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="13">Content Area: 1177 × 490 px</text>

    <!-- 页脚分隔 -->
    <line x1="0" y1="660" x2="1280" y2="660" stroke="#E5E7EB" stroke-width="1"/>

    <!-- 数据来源 -->
    <text x="60" y="687" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="12" fill="#95A5A6">Source: {{SOURCE}}</text>

    <!-- 右下版权声明 -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#808080">Copyright© 飞友科技. All rights reserved.</text>
</svg>
