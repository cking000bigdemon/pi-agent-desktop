<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 内容页 (双图表 + 底部信息条) - 飞常准品牌风格 (literal fidelity from slide 14) -->

    <defs>
        <linearGradient id="bottomBlue" x1="0.5" y1="1" x2="0.5" y2="0">
            <stop offset="0" stop-color="#0048AA"/>
            <stop offset="0.98" stop-color="#2C68FF"/>
        </linearGradient>
        <filter id="cardShadow" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#002455" flood-opacity="0.18"/>
        </filter>
    </defs>

    <!-- 白色背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

    <!-- 顶部小蓝色装饰块 + 标题 -->
    <rect x="0" y="43.87" width="36.69" height="51.13" fill="#0048AA"/>
    <text x="57.6" y="78" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="26" font-weight="bold" fill="#0048AA">{{PAGE_TITLE}}</text>

    <!-- 顶部分隔线 -->
    <line x1="0" y1="113" x2="1280" y2="113" stroke="#E5E7EB" stroke-width="1"/>

    <!-- 底部品牌色渐变条 -->
    <rect x="0" y="502.67" width="1280" height="217.33" fill="url(#bottomBlue)"/>

    <!-- 主要白色卡片 (浮在中部) -->
    <rect x="91.83" y="168" width="1096.33" height="396.67" fill="#FFFFFF" filter="url(#cardShadow)"/>

    <!-- 左子卡: 小标题 + 分隔线 + 描述 -->
    <line x1="121.86" y1="248.31" x2="607" y2="248.31" stroke="#0048AA" stroke-width="1.5"/>
    <text x="118.57" y="228.27" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="24" fill="#0048AA" font-weight="bold">{{LEFT_SUBTITLE}}</text>
    <text x="118.57" y="273.81" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="16" fill="#0048AA">{{LEFT_DESCRIPTION}}</text>

    <!-- 右子卡: 小标题 + 分隔线 + 描述 -->
    <line x1="671.53" y1="248.31" x2="1160.04" y2="248.31" stroke="#0048AA" stroke-width="1.5"/>
    <text x="670.99" y="228.27" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="24" fill="#0048AA" font-weight="bold">{{RIGHT_SUBTITLE}}</text>
    <text x="670.99" y="273.81" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="16" fill="#0048AA">{{RIGHT_DESCRIPTION}}</text>

    <!-- 左图表占位 -->
    <rect x="133.52" y="293.83" width="431.54" height="250.07" fill="none" stroke="#999999" stroke-dasharray="4 4"/>
    <text x="349.28" y="418.87" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#999999">{{LEFT_CHART}}</text>

    <!-- 右图表占位 -->
    <rect x="666.2" y="292.53" width="505.47" height="255.67" fill="none" stroke="#999999" stroke-dasharray="4 4"/>
    <text x="918.93" y="420.37" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#999999">{{RIGHT_CHART}}</text>

    <!-- 底部白色总结文字 -->
    <text x="640" y="630" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="24" fill="#FFFFFF">{{BOTTOM_INSIGHT}}</text>

    <!-- 右下版权声明 -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.7">Copyright© 飞友科技. All rights reserved.</text>
</svg>
