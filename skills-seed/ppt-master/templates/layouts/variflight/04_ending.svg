<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 结束页 (感谢/联系我们) - 飞常准品牌风格 (literal fidelity from slide 08) -->

    <defs>
        <radialGradient id="iconBlueDot" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0.39" stop-color="#0048AA"/>
            <stop offset="1" stop-color="#BBD8FF" stop-opacity="0.7"/>
        </radialGradient>
    </defs>

    <!-- 白色背景 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

    <!-- 主白色卡 (浮在背景上) -->
    <rect x="105.92" y="72.72" width="1070.92" height="533.88" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <!-- 顶部 Logo (公司 logo) -->
    <image href="assets/logo.png" x="143" y="92" width="176.55" height="42.49" preserveAspectRatio="none"/>

    <!-- 大标题 Contact Us -->
    <text x="177.85" y="208" font-family="&quot;微软雅黑&quot;, Poppins, sans-serif" font-size="58.67" fill="#0048AA" font-weight="bold">{{ENDING_TITLE_EN}}</text>
    <text x="177.85" y="265" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="34" fill="#0048AA" font-weight="bold">{{ENDING_TITLE_CN}}</text>

    <!-- 联系人 -->
    <circle cx="208.53" cy="335" r="14" fill="url(#iconBlueDot)"/>
    <text x="265.67" y="320" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#0048AA">{{CONTACT_LABEL_NAME}}</text>
    <text x="265.68" y="350" font-family="&quot;微软雅黑&quot;, Poppins, sans-serif" font-size="22" fill="#404040">{{CONTACT_NAME}}</text>
    <line x1="265.68" y1="376" x2="670" y2="376" stroke="#BFBFBF" stroke-width="1"/>

    <!-- 联系电话 -->
    <circle cx="208.53" cy="426" r="14" fill="url(#iconBlueDot)"/>
    <text x="265.67" y="412" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#0048AA">{{CONTACT_LABEL_PHONE}}</text>
    <text x="265.68" y="442" font-family="&quot;微软雅黑&quot;, Poppins, sans-serif" font-size="22" fill="#404040">{{CONTACT_PHONE}}</text>
    <line x1="265.68" y1="468" x2="670" y2="468" stroke="#BFBFBF" stroke-width="1"/>

    <!-- 公司地址 -->
    <circle cx="208.53" cy="518" r="14" fill="url(#iconBlueDot)"/>
    <text x="265.68" y="504" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="22" fill="#0048AA">{{CONTACT_LABEL_ADDR}}</text>
    <text x="265.68" y="534" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="20" fill="#404040">{{CONTACT_ADDRESS}}</text>

    <!-- 右侧装饰区 (网站二维码 / 装饰图占位) -->
    <rect x="780" y="225" width="320" height="280" fill="#F5F7FB" stroke="#E5E7EB" stroke-dasharray="6 4"/>
    <text x="940" y="370" text-anchor="middle" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="14" fill="#999999">{{ENDING_DECORATION}}</text>

    <!-- 右下版权声明 -->
    <text x="1253.8" y="697.46" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#808080">Copyright© 飞友科技. All rights reserved.</text>
</svg>
