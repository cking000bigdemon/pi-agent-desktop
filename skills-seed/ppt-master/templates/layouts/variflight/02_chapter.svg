<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- 模板: 章节封面 - 飞常准品牌风格 (literal fidelity from layout 02 + slide 04) -->

    <defs>
        <linearGradient id="chapterDiagonal" x1="1" y1="0.5" x2="0" y2="0.5">
            <stop offset="0" stop-color="#1954EB"/>
            <stop offset="0.83" stop-color="#144484"/>
        </linearGradient>
    </defs>

    <!-- 背景图 (chapter_bg) -->
    <image href="assets/chapter_bg.jpeg" x="-0.07" y="0" width="1298.27" height="720" preserveAspectRatio="xMidYMid slice"/>

    <!-- 白色 90% 蒙层 -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" fill-opacity="0.9"/>

    <!-- 左侧小蓝色装饰条 -->
    <rect x="87.4" y="298.33" width="63.4" height="119.27" fill="#144484"/>

    <!-- 主对角蓝色渐变条 -->
    <rect x="228.4" y="298.33" width="963.67" height="119.27" fill="url(#chapterDiagonal)"/>

    <!-- 章节编号 (左侧白色小标) -->
    <text x="119.1" y="375" text-anchor="middle" font-family="&quot;Gadugi&quot;, &quot;微软雅黑&quot;, sans-serif" font-size="44" font-weight="bold" fill="#FFFFFF">{{CHAPTER_NUM}}</text>

    <!-- 章节标题 (大渐变条上) -->
    <text x="262.45" y="375" font-family="&quot;微软雅黑&quot;, sans-serif" font-size="44" fill="#FFFFFF" font-weight="bold">{{CHAPTER_TITLE}}</text>

    <!-- 章节英文副标题 (大渐变条下) -->
    <text x="228.4" y="455" font-family="&quot;Gadugi&quot;, sans-serif" font-size="20" fill="#144484" letter-spacing="2">{{CHAPTER_SUBTITLE_EN}}</text>

    <!-- 右下版权声明 (layout 02 自带) -->
    <text x="1253.8" y="697.87" text-anchor="end" font-family="&quot;微软雅黑&quot;, Arial, sans-serif" font-size="14" fill="#808080">Copyright© 飞友科技. All rights reserved.</text>
</svg>
