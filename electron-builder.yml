appId: com.agegr.piwebdesktop
productName: Pi Agent
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: build

# Only the Electron shell goes into the asar. The bundled Node runtime and the
# pi-web runtime seed are shipped UNPACKED as extraResources (Node can't run
# from inside an asar; the seed is copied to a writable user dir on first run).
files:
  - electron/**/*
  - package.json

extraResources:
  # Bundled Node.js runtime (node.exe + npm) -> resources/node
  - from: vendor/node
    to: node
  # Bundled relocatable Python (python-build-standalone + ppt-master deps
  # pre-installed) -> resources/python. Provisioned by `npm run seed:python`.
  # Wired into the pi server env in main.js so the venv guard creates project
  # .venvs from it (zero system-Python dependency) and ppt-master runs on it
  # offline (zero runtime pip install). Strip caches/test noise to trim size.
  - from: vendor/python
    to: python
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/test/**"
      - "!**/tests/**"
  # pi-web runtime seed (npm prod install of @agegr/pi-web) -> resources/runtime-seed
  - from: runtime-seed
    to: runtime-seed
    filter:
      - "**/*"
      - "!**/*.map"
      - "!**/.cache/**"
  # Default pi extensions (5 single-file .ts + shared deps) -> resources/extensions-seed.
  # Copied into ~/.pi/agent/extensions/ on first run (see ensureBundledExtensions in main.js).
  - from: extensions-seed
    to: extensions-seed
    filter:
      - "**/*"
      - "!**/*.map"
  # Default OKF knowledge skills (wiki-init/compile/query/lint + okf-visualizer).
  # Pure-stdlib Python; copied into ~/.pi/agent/skills/ on first run (see
  # ensureBundledSkills in main.js). __pycache__ / *.pyc are excluded from the bundle.
  - from: skills-seed
    to: skills-seed
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - dmg
  icon: build/icon.icns
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Development
